name: Executar alvos de preço

# O agendamento automático agora é feito pelo Apps Script (gatilho de tempo),
# que é confiável — ver google-apps-script/Code.gs (função runPriceTargets).
# Este workflow fica como DISPARO MANUAL de backup (Actions > Run workflow).
# O cron do GitHub foi removido por ser instável (atrasa/descarta execuções).
on:
  workflow_dispatch:

# Evita execuções concorrentes do robô.
concurrency:
  group: run-orders
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Executar alvos
        run: node scripts/run-orders.mjs
        env:
          SHEET_URL: ${{ secrets.SHEET_URL }}
          SHEET_SECRET: ${{ secrets.SHEET_SECRET }}
