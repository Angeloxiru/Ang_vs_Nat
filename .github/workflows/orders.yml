name: Executar alvos de preço

# Em dias úteis, das 10:00 às 17:00 (BRT = UTC-3 -> 13:00-20:00 UTC),
# a cada 15 minutos. Também pode ser disparado manualmente.
on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:

# Evita execuções concorrentes do robô.
concurrency:
  group: run-orders
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Executar alvos
        run: node scripts/run-orders.mjs
        env:
          SHEET_URL: ${{ secrets.SHEET_URL }}
          SHEET_SECRET: ${{ secrets.SHEET_SECRET }}
